<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
  <!-- Tre layer impilati: l'architettura. Il layer centrale è troncato e al suo
       posto c'è un quadrato vuoto: è lo "spazio negativo" di CodeOS, l'invariante
       che leggiamo dove il codice tace. -->
  <rect x="3" y="4" width="18" height="3" rx="1.5" />
  <rect x="3" y="10.5" width="9.5" height="3" rx="1.5" />
  <rect x="3" y="17" width="18" height="3" rx="1.5" />
  <rect
    x="15"
    y="10.5"
    width="3"
    height="3"
    rx="0.8"
    fill="none"
    stroke="currentColor"
    stroke-width="1.2"
  />
</svg>
