# CodeOS Certify — cancello di NON-REGRESSIONE architetturale su ogni PR.
#
# Copia questo file in `.github/workflows/` del TUO repository.
# A ogni pull request: costruisce CodeOS, indicizza il repo, riduce l'MRI a un
# verdetto binario e lo commenta sulla PR. Esce ≠0 (la PR non passa il gate)
# quando la modifica attraversa un confine architetturale governato.
#
# Onestà del verdetto (vedi `codeos certify`):
#   ✅ NO REGRESSION   = nessuna regressione architetturale RILEVATA (rispetto agli
#                        invarianti noti) — NON è una prova di assenza di bug.
#   ⚠️  REGRESSION POSSIBLE = la modifica tocca un confine governato o ha rischio alto.
#
# NB: questo template assume che CodeOS sia disponibile nel repo o via release.
# Adatta i passi di build/avvio al tuo setup (qui si assume un workspace cargo).

name: CodeOS Certify
on:
  pull_request:

permissions:
  contents: read
  pull-requests: write   # per commentare la PR

jobs:
  certify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # la storia git completa serve agli invarianti calibrati

      - name: Build CodeOS
        run: cargo build --release -p codeos-rpc

      - name: Avvia il server e indicizza
        run: |
          CODEOS_REPO="$GITHUB_WORKSPACE" CODEOS_DB=/tmp/codeos.db \
            ./target/release/codeos-server &
          for i in $(seq 1 30); do
            ./target/release/codeos doctor >/dev/null 2>&1 && break || sleep 1
          done
          ./target/release/codeos index "$GITHUB_WORKSPACE"

      - name: Certifica la PR (JSON, parsabile)
        # Non fa fallire lo step: il verdetto va commentato comunque; il gate vero
        # è lo step finale, che rilegge l'exit code.
        run: |
          ./target/release/codeos certify --json \
            --base "origin/${{ github.base_ref }}" \
            --head "${{ github.sha }}" > verdict.json || true
          cat verdict.json

      - name: Commenta il verdetto sulla PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let v;
            try { v = JSON.parse(fs.readFileSync('verdict.json', 'utf8')); }
            catch (e) { return; }   // niente verdetto valido ⇒ niente commento
            const icon = v.ok ? '✅' : '⚠️';
            let body = `### 🔏 CodeOS Certify\n\n${icon} **${v.headline}**\n`;
            if (v.reasons && v.reasons.length) {
              body += '\n**Motivi:**\n' + v.reasons.map(r => `- ${r}`).join('\n') + '\n';
            }
            body += `\n_Rischio: ${v.risk_score} · ${v.summary}_`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Applica il gate (fallisce su ⚠️)
        run: |
          ./target/release/codeos certify \
            --base "origin/${{ github.base_ref }}" \
            --head "${{ github.sha }}"
